# Windows-laptop subset of scripts/environment.yml.
#
# The full env (R + bioconductor + plink + htslib) is Linux/macOS only —
# bioconda doesn't ship Windows builds of plink, htslib, or the bioconductor
# stack. For laptop work that doesn't touch R/plink (atlas loaders, scDRS,
# concordance tests, MAGMA via WSL), this subset is sufficient.
#
# Use this on Windows; use the full environment.yml on Hummingbird.
name: uc-cross-atlas
channels:
  - conda-forge
  - bioconda
dependencies:
  - python=3.10
  - pip

  # numerics + plotting
  - numpy>=1.24,<2.0
  - pandas>=2.0
  - scipy>=1.10
  - scikit-learn>=1.3
  - statsmodels>=0.14
  - matplotlib>=3.8
  - seaborn>=0.13
  - pyarrow>=14.0

  # single-cell
  - anndata>=0.10
  - scanpy>=1.10

  # dev
  - pytest>=8.0

  # scDRS (pip-only)
  - pip:
      - scdrs==1.0.4
